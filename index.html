<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تطبيق نصائح التفوق الدراسي</title>
  <style>
    :root{
      --navy:#133c84;
      --blue:#2f8ef3;
      --light-blue:#eef8ff;
      --green:#61c63a;
      --green-dark:#41a71f;
      --orange:#ff9d2e;
      --purple:#8c65e5;
      --gold:#f6c443;
      --text:#1c2e4c;
      --soft:#f8fcff;
      --card:#ffffff;
      --line:#cfe5fb;
      --shadow:0 10px 24px rgba(23,71,140,.12);
      --shadow-soft:0 8px 18px rgba(23,71,140,.08);
    }
    *{box-sizing:border-box}
    html{height:100%;scroll-behavior:smooth;overflow-y:auto;}
    body{
      margin:0;
      min-height:100%;
      font-family:"Tahoma","Arial",sans-serif;
      background:linear-gradient(180deg,#edf8ff 0%, #e8f5ff 65%, #dbf0ff 100%);
      color:var(--text);
      overflow-x:hidden;
      overflow-y:auto;
    }
    button,input,select,textarea{font:inherit}
    .app-shell{
      position:relative;
      width:min(100%, 980px);
      margin:0 auto;
      min-height:100vh;
      padding-bottom:8.8rem;
      background:transparent;
      overflow:visible;
    }
    .app-shell::before,
    .app-shell::after{content:"";position:absolute;inset:auto auto auto 0;pointer-events:none;z-index:0;opacity:.55;}
    .app-shell::before{width:210px;height:210px;top:120px;left:15px;background:radial-gradient(circle at center, rgba(255,255,255,.88) 0 33%, transparent 34% 100%);filter:blur(.2px)}
    .app-shell::after{right:15px;top:125px;width:190px;height:190px;background:radial-gradient(circle at center, rgba(255,255,255,.88) 0 33%, transparent 34% 100%);filter:blur(.2px)}
    .bottom-land{position:fixed;left:0;right:0;bottom:0;height:170px;pointer-events:none;z-index:-1;background:linear-gradient(180deg, transparent 0 30%, #6fd044 30% 72%, #1d88de 72% 100%);}
    .topbar,.content,.bottom-nav,.footer{position:relative;z-index:1}
    .topbar{display:grid;grid-template-columns:minmax(86px,125px) 1fr minmax(86px,125px);align-items:start;gap:1rem;padding:1rem 1rem .2rem;direction:ltr}
    .topbar>*{direction:rtl}
    .brand-wrap{text-align:center;min-width:0}
    .brand{width:clamp(112px,16vw,160px);aspect-ratio:1/1;object-fit:contain;mix-blend-mode:multiply;filter:drop-shadow(0 6px 10px rgba(20,80,120,.12));}
    .mini-card{border:1px solid rgba(178,220,255,.95);background:rgba(255,255,255,.95);border-radius:28px;box-shadow:var(--shadow-soft);color:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:102px;padding:.5rem .4rem;gap:.2rem;cursor:pointer}
    .mini-card .big-icon{font-size:2rem;line-height:1}
    .mini-card .num{font-weight:900;font-size:2rem;line-height:1.1}
    .mini-card .label{font-weight:900;font-size:1.1rem}
    .back-card .arrow{font-size:2.1rem;font-weight:900}
    .content{width:min(calc(100% - 1.5rem), 930px);margin:0 auto;padding-bottom:1rem;}
    .center{text-align:center}
    .main-title{margin:.15rem 0 .3rem;font-weight:900;font-size:clamp(2rem,6vw,4rem);line-height:1.15;color:var(--navy);text-shadow:0 5px 0 rgba(19,60,132,.08)}
    .page-title{margin:.1rem 0 .35rem;font-weight:900;font-size:clamp(1.8rem,5vw,3rem);line-height:1.2;color:var(--navy)}
    .pill{display:inline-flex;align-items:center;justify-content:center;padding:.42rem 1.25rem;border-radius:999px;background:linear-gradient(180deg,var(--green),var(--green-dark));color:#fff;font-weight:900;box-shadow:0 6px 16px rgba(76,175,80,.3);font-size:1.1rem;min-height:40px}
    .hero-card{display:grid;grid-template-columns:1.15fr .85fr;gap:1rem;align-items:center;margin:1rem auto;padding:1.15rem;background:rgba(255,255,255,.97);border:2px solid #bdddff;border-radius:34px;box-shadow:var(--shadow);min-height:280px;overflow:hidden}
    .hero-copy h2{margin:.2rem 0 .55rem;color:var(--navy);font-size:clamp(1.9rem,4vw,2.8rem);font-weight:900}
    .hero-copy p{margin:.3rem 0;line-height:1.8;font-size:1.15rem;font-weight:700;color:#29436f}
    .hero-actions{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:.9rem}
    .poster-wrap{display:flex;justify-content:center;align-items:center}
    .poster{width:min(100%, 360px);border-radius:28px;border:2px solid #d3e9fd;box-shadow:var(--shadow-soft);background:#fff;}
    .quote-box{margin-top:.8rem;background:#f5fbff;border:2px dashed #cde5fb;border-radius:22px;padding:.85rem 1rem;color:#33507a;font-weight:800;line-height:1.8}
    .module-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem;margin:1rem 0}
    .module-card{position:relative;border:2px solid #cde5fb;background:rgba(255,255,255,.98);border-radius:28px;padding:1rem .9rem 1rem 4rem;min-height:150px;box-shadow:var(--shadow-soft);text-align:right;cursor:pointer}
    .module-card h3{margin:.1rem 0 .35rem;font-size:1.45rem;color:var(--navy)}
    .module-card p{margin:0;color:#41608f;line-height:1.7;font-weight:700}
    .module-card .emoji{position:absolute;left:1rem;bottom:1rem;font-size:2.5rem}
    .module-card .bubble{position:absolute;top:1rem;right:1rem;width:40px;height:40px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:900;box-shadow:0 4px 10px rgba(0,0,0,.09)}
    .section-card,.card{background:rgba(255,255,255,.98);border:2px solid #cde5fb;border-radius:28px;padding:1rem;box-shadow:var(--shadow-soft)}
    .tips-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.9rem;margin-top:.9rem}
    .tip-mini{position:relative;background:#fbfeff;border:2px solid #d7eafb;border-radius:24px;padding:.95rem .85rem .9rem;min-height:135px;cursor:pointer;transition:.2s ease;}
    .tip-mini.active{transform:translateY(-2px);border-color:#7dcc52;box-shadow:0 12px 22px rgba(76,175,80,.12)}
    .tip-mini.done::after{content:"✓";position:absolute;left:10px;top:10px;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:#62c63b;color:#fff;font-weight:900}
    .tip-mini .n{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:50%;color:#fff;font-weight:900;margin-bottom:.5rem}
    .tip-mini h4{margin:.1rem 0 .35rem;font-size:1.25rem;color:var(--navy)}
    .tip-mini p{margin:0;color:#4d678f;font-weight:700;line-height:1.6;font-size:.95rem}
    .detail-card{margin-top:1rem;display:grid;grid-template-columns:220px 1fr;gap:1rem;align-items:stretch}
    .tip-art{border-radius:24px;background:linear-gradient(180deg,#eff8ff,#ffffff);border:2px dashed #cfe4fa;padding:1rem;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:.45rem;min-height:260px}
    .tip-art .big{font-size:4rem;line-height:1}
    .tip-art .tag{display:inline-flex;padding:.35rem .8rem;border-radius:999px;background:#eaf7df;color:#2d7c1f;font-weight:900}
    .tip-content h3{margin:.1rem 0 .35rem;font-size:2rem;color:var(--navy)}
    .tip-content p{margin:.2rem 0;color:#35527d;line-height:1.9;font-weight:800}
    .tip-content ul{margin:.45rem 0 0;padding:0 1.2rem 0 0;color:#274169;line-height:1.95;font-weight:800}
    .action-row{display:flex;justify-content:space-between;gap:.8rem;align-items:center;margin-top:1rem;flex-wrap:wrap}
    .btn{border:0;border-radius:18px;padding:.8rem 1.15rem;font-weight:900;cursor:pointer;box-shadow:var(--shadow-soft)}
    .btn.primary{background:linear-gradient(180deg,var(--green),var(--green-dark));color:#fff}
    .btn.secondary{background:#ecf6ff;color:var(--navy);border:2px solid #cfe5fb}
    .btn.purple{background:linear-gradient(180deg,#9b7af2,#7a58d8);color:#fff}
    .btn.blue{background:linear-gradient(180deg,#48a4ff,#167ae2);color:#fff}
    .callout{display:flex;align-items:center;gap:1rem;margin:.95rem 0;padding:.95rem 1rem;background:rgba(255,255,255,.98);border:2px solid #cde5fb;border-radius:24px;box-shadow:var(--shadow-soft)}
    .bars{display:flex;align-items:flex-end;gap:.2rem}
    .bars span{width:10px;border-radius:999px;background:linear-gradient(180deg,#75d948,#56b631)}
    .bars span:nth-child(1){height:34px} .bars span:nth-child(2){height:26px} .bars span:nth-child(3){height:18px}
    .start-btn{width:100%;min-height:58px;border:0;border-radius:999px;background:linear-gradient(180deg,var(--green),var(--green-dark));color:#fff;font-size:1.9rem;font-weight:900;display:flex;align-items:center;justify-content:center;gap:.7rem;box-shadow:0 10px 18px rgba(76,175,80,.25);cursor:pointer}
    .activity-tabs{display:flex;gap:.65rem;flex-wrap:wrap;margin-bottom:1rem}
    .tab-btn{border:2px solid #cfe5fb;background:#fff;color:var(--navy);border-radius:18px;padding:.7rem 1rem;font-weight:900;cursor:pointer}
    .tab-btn.active{background:#e9f6ff;border-color:#7dcc52;color:#246319}
    .activity-body{margin-top:.2rem}
    .question{font-size:1.25rem;color:var(--navy);font-weight:900;margin-bottom:.9rem}
    .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.8rem}
    .option-btn{border:2px solid #d4e8fb;background:#fff;border-radius:20px;padding:.9rem 1rem;text-align:right;font-weight:800;color:#31507a;cursor:pointer}
    .option-btn.correct{border-color:#7dcc52;background:#f2ffe9;color:#29671d}
    .feedback{margin-top:.85rem;padding:.8rem 1rem;border-radius:18px;font-weight:900;display:none}
    .feedback.show{display:block}
    .feedback.good{background:#eefbe6;color:#26691b;border:2px solid #bfe6a6}
    .feedback.bad{background:#fff1f1;color:#9b2f2f;border:2px solid #f3b7b7}
    .sequence-pool,.sequence-selected{display:flex;flex-wrap:wrap;gap:.55rem;margin-top:.7rem}
    .chip{border:2px solid #cfe5fb;background:#fff;border-radius:999px;padding:.55rem .95rem;font-weight:900;color:#35527d;cursor:pointer}
    .chip.used{opacity:.45;pointer-events:none}
    .sequence-box{min-height:58px;padding:.75rem;border-radius:20px;border:2px dashed #cfe5fb;background:#fbfeff;margin-top:.7rem}
    .checks{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.8rem}
    .check-item{display:flex;align-items:center;gap:.7rem;padding:.8rem .9rem;border:2px solid #d7eafb;border-radius:18px;background:#fff;font-weight:800;color:#31507a}
    .check-item input{transform:scale(1.2)}
    .quiz-card .q-item{padding:1rem;border-radius:22px;border:2px solid #d7eafb;background:#fbfeff;margin-bottom:.85rem}
    .q-title{margin:0 0 .7rem;color:var(--navy);font-size:1.15rem;font-weight:900}
    .choices{display:grid;gap:.5rem}
    .choices label{display:flex;align-items:flex-start;gap:.55rem;padding:.65rem .75rem;border:2px solid #e0eefc;border-radius:16px;background:#fff;color:#35527d;font-weight:800;cursor:pointer}
    .result-box{margin-top:1rem;padding:1rem;border-radius:24px;background:#f5fbff;border:2px solid #cfe5fb;text-align:center}
    .result-box h3{margin:.1rem 0 .35rem;font-size:2rem;color:var(--navy)}
    .stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.9rem}
    .stat{padding:1rem;border-radius:24px;background:#fff;border:2px solid #d7eafb;text-align:center;box-shadow:var(--shadow-soft)}
    .stat .big{font-size:2.3rem;font-weight:900;color:var(--navy)}
    .badge-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.85rem;margin-top:1rem}
    .badge{padding:1rem;border-radius:22px;background:#fff;border:2px solid #d7eafb;text-align:center;box-shadow:var(--shadow-soft);min-height:128px;display:grid;place-items:center;gap:.35rem}
    .badge.locked{filter:grayscale(1);opacity:.55}
    .badge .emoji{font-size:2.5rem}
    .profile-card{display:grid;grid-template-columns:1fr 260px;gap:1rem;align-items:start}
    .daily-list{display:grid;gap:.65rem;margin-top:.8rem}
    .daily-item{display:flex;align-items:center;gap:.65rem;padding:.75rem .9rem;background:#fff;border:2px solid #d7eafb;border-radius:18px;font-weight:800;color:#35527d}
    .motivation{background:linear-gradient(180deg,#fffdf4,#ffffff);border:2px dashed #ecd88a;border-radius:22px;padding:1rem;text-align:center}
    .motivation .hero-emoji{font-size:4rem;display:block;line-height:1}
    .bottom-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:2.2rem;width:min(calc(100% - 1rem), 780px);min-height:74px;background:rgba(255,255,255,.98);border:2px solid rgba(188,223,255,.88);border-radius:28px;box-shadow:0 12px 30px rgba(7,68,125,.23);display:grid;grid-template-columns:repeat(5,1fr);overflow:visible;z-index:7}
    .nav-btn{border:0;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.15rem;color:var(--navy);font-weight:900;padding:.45rem .2rem;position:relative;min-width:0;cursor:pointer}
    .nav-btn+.nav-btn{border-right:1px solid #d8eafa}
    .nav-btn .nav-emoji{font-size:1.85rem;line-height:1}
    .nav-btn .nav-label{font-size:.92rem;white-space:nowrap}
    .nav-btn.active::before{content:"";position:absolute;top:-20px;width:68px;height:68px;border-radius:50%;background:linear-gradient(180deg,#2da4ff,#086fca);box-shadow:0 10px 20px rgba(8,112,202,.3),0 0 0 6px #fff;z-index:-1}
    .nav-btn.active .nav-emoji{font-size:2.05rem;transform:translateY(-8px)}
    .nav-btn.active .nav-label{transform:translateY(-4px)}
    .footer{position:fixed;left:0;right:0;bottom:.45rem;padding:0 .75rem;color:#fff;text-align:center;font-weight:900;font-size:1rem;z-index:6;pointer-events:none;text-shadow:0 2px 4px rgba(0,0,0,.18)}
    @media (max-width:860px){
      .hero-card,.detail-card,.profile-card{grid-template-columns:1fr}
      .tips-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .stats-grid,.badge-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:640px){
      .app-shell{padding-bottom:8.5rem}
      .topbar{grid-template-columns:82px 1fr 82px;gap:.6rem;padding:.85rem .75rem .1rem}
      .brand{width:105px}
      .mini-card{min-height:86px;border-radius:24px}
      .mini-card .big-icon{font-size:1.6rem} .mini-card .num{font-size:1.6rem} .mini-card .label{font-size:.95rem}
      .content{width:calc(100% - 1rem)}
      .hero-card{padding:1rem;min-height:auto}
      .hero-copy p{font-size:1rem}
      .module-grid,.options,.checks{grid-template-columns:1fr}
      .tips-grid,.stats-grid,.badge-grid{grid-template-columns:1fr}
      .bottom-nav{width:calc(100% - .7rem);min-height:68px;bottom:2rem}
      .nav-btn .nav-emoji{font-size:1.55rem} .nav-btn .nav-label{font-size:.75rem}
      .nav-btn.active::before{width:58px;height:58px;top:-18px}
      .footer{font-size:.9rem}
    }
  </style>
</head>

    function go(page){

      saveState();
      render();

    function markTipVisit(index){

        state.activityOneRewarded = true;
      }
      saveState(); render();
    }
    function addRoutine(item){
      if(state.routineSelected.includes(item)) return;
      state.routineSelected.push(item);
      saveState(); render();
    }
    function resetRoutine(){
      state.routineSelected = [];
      state.routineChecked = false;
      saveState(); render();
    }
    function checkRoutine(){
      const target = ['الانتباه','تنظيم الوقت','السؤال','المذاكرة','الواجبات','القراءة'];
      const ok = JSON.stringify(state.routineSelected) === JSON.stringify(target);
      state.routineChecked = true;
      state.routineCorrect = ok;
      if(ok && !state.routineRewarded){
        state.stars += 4;
        state.routineRewarded = true;
      }
      saveState(); render();
    }
    function toggleHealthy(item){
      const i = state.healthySelected.indexOf(item);
      if(i > -1) state.healthySelected.splice(i,1); else state.healthySelected.push(item);
      saveState(); render();
    }
    function finishHealthy(){
      state.healthyDone = true;
      if(state.healthySelected.length >= 4 && !state.healthyRewarded){
        state.stars += 4;
        state.healthyRewarded = true;
      }
      saveState(); render();
    }
    function setQuizAnswer(qIndex, choice){
      state.quizAnswers[qIndex] = choice;
      saveState();
    }
    function submitQuiz(){
      let score = 0;
      quiz.forEach((q,i)=>{ if(Number(state.quizAnswers[i]) === q.c) score++; });
      state.quizSubmitted = true;
      state.quizScore = score;
      if(!state.quizRewarded){
        state.stars += score >= 4 ? 6 : score >= 2 ? 3 : 1;
        state.quizRewarded = true;
      }
      saveState(); render();
      window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
    }
    function resetAll(){
      if(confirm('هل تريد إعادة التقدم في التطبيق؟')){
        localStorage.removeItem('study_success_app_v1');
        state = loadState();
        render();
      }
    }

    function getBadges(){
      return [
        {title:'بداية قوية', emoji:'⭐', unlocked:state.stars >= 5, hint:'اجمع ٥ نجوم'},
        {title:'متعلم نشيط', emoji:'📚', unlocked:state.visitedTips.length === tips.length, hint:'تعلّم كل النصائح'},
        {title:'بطل الأنشطة', emoji:'🧩', unlocked:!!(state.activityOneRewarded && state.routineRewarded && state.healthyRewarded), hint:'أكمل جميع الأنشطة'},
        {title:'متفوق صغير', emoji:'🏆', unlocked:state.quizScore >= 4, hint:'احصل على ٤ من ٥ في الاختبار'},
        {title:'عادات صحية', emoji:'🍎', unlocked:state.healthySelected.length >= 4 && state.healthyDone, hint:'اختر ٤ عادات صحية'},
        {title:'واثق بنفسك', emoji:'🛡️', unlocked:state.stars >= 15, hint:'اجمع ١٥ نجمة'}
      ];
    }

    function renderHome(){
      return `
        <section class="center">
          <h1 class="main-title">نصائح للتفوق الدراسي</h1>
          <span class="pill">تعلم وطبّق وانطلق</span>
        </section>
        <section class="hero-card">
          <div class="hero-copy">
            <h2>طريقك إلى النجاح يبدأ بخطوة!</h2>
            <p>هذا التطبيق يساعدك على تعلّم أهم النصائح التي تجعل يومك الدراسي منظمًا، ومذاكرتك أسهل، وثقتك بنفسك أقوى.</p>
            <div class="quote-box">"الطالب المتفوق ليس من لا يخطئ، بل من يتعلم من خطئه، وينظّم وقته، ويجتهد كل يوم حتى يصل إلى النجاح."</div>
            <div class="hero-actions">
              <button class="btn primary" onclick="go('tips')">ابدأ النصائح</button>
              <button class="btn blue" onclick="go('activities')">ألعب وأتعلّم</button>
            </div>
          </div>
          <div class="poster-wrap">
            <img class="poster" src="${posterImg}" alt="ملصق نصائح التفوق الدراسي">
          </div>
        </section>
        <section class="module-grid">
          <button class="module-card" onclick="go('tips')">
            <span class="bubble">١</span>
            <h3>ابدأ التعلّم</h3>
            <p>تعرّف على نصائح التفوق الدراسي خطوة بخطوة.</p>
            <span class="emoji">📘</span>
          </button>
          <button class="module-card" onclick="go('activities')">
            <span class="bubble" style="background:#2f8ef3">٢</span>
            <h3>أنشطة ممتعة</h3>
            <p>جرّب أنشطة تفاعلية تساعدك على التطبيق.</p>
            <span class="emoji">🧩</span>
          </button>
          <button class="module-card" onclick="go('quiz')">
            <span class="bubble" style="background:#ff9d2e">٣</span>
            <h3>اختبر نفسك</h3>
            <p>اختبار قصير مع تغذية راجعة فورية.</p>
            <span class="emoji">📝</span>
          </button>
          <button class="module-card" onclick="go('achievements')">
            <span class="bubble" style="background:#8c65e5">٤</span>
            <h3>إنجازاتي</h3>
            <p>تابع تقدمك واجمع النجوم والشارات.</p>
            <span class="emoji">🏆</span>
          </button>
        </section>
        <div class="callout">
          <div class="bars"><span></span><span></span><span></span></div>
          <div><b>تفوقك يبدأ بالعادات الصغيرة.</b><br><span>انتبه، نظّم وقتك، اسأل، ذاكر، أنجز واجبك، واقرأ كل يوم.</span></div>
          <div style="margin-right:auto;font-size:2.3rem">⭐</div>
        </div>
        <button class="start-btn" onclick="go('tips')"><span>🚀</span> ابدأ الآن</button>
      `;
    }

    function renderTips(){
      const tip = tips[state.tipIndex];
      return `
        <section class="center">
          <h1 class="page-title">ابدأ التعلّم</h1>
          <span class="pill">النصيحة ${tip.number} من ٦</span>
        </section>
        <section class="section-card">
          <div class="tips-grid">
            ${tips.map((t,i)=>`<button class="tip-mini ${i===state.tipIndex?'active':''} ${state.visitedTips.includes(t.id)?'done':''}" onclick="markTipVisit(${i})">
                <span class="n" style="background:${t.color}">${t.number}</span>
                <h4>${t.title}</h4>
                <p>${t.desc}</p>
              </button>`).join('')}
          </div>
          <div class="detail-card">
            <div class="tip-art">
              <div class="big">${tip.icon}</div>
              <div class="tag">نصيحة مهمة</div>
              <div style="font-size:1.15rem;font-weight:900;color:${tip.color}">رقم ${tip.number}</div>
              <div style="font-weight:900;color:var(--navy)">${tip.title}</div>
            </div>
            <div class="card tip-content">
              <h3>${tip.title}</h3>
              <p>${tip.details}</p>
              <p><b>كيف تطبقها؟</b></p>
              <ul>${tip.apply.map(item=>`<li>${item}</li>`).join('')}</ul>
              <p style="margin-top:.8rem"><b>مثال:</b> ${tip.example}</p>
              <div class="action-row">
                <button class="btn secondary" onclick="nextTip(-1)">السابق</button>
                <button class="btn primary" onclick="nextTip(1)">التالي</button>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderActivities(){
      const target = ['الانتباه','تنظيم الوقت','السؤال','المذاكرة','الواجبات','القراءة'];
      const chooseFeedback = state.activityOneAnswered ? (state.activityOneCorrect ?
        '<div class="feedback show good">أحسنت! تنظيم الوقت يساعدك على إنجاز واجباتك ومذاكرتك براحة.</div>' :
        '<div class="feedback show bad">حاول مرة أخرى. الإجابة الصحيحة هي: تنظيم الوقت.</div>') : '';
      const routineFeedback = state.routineChecked ? (state.routineCorrect ?
        '<div class="feedback show good">رائع! رتبت النصائح بالترتيب الصحيح.</div>' :
        '<div class="feedback show bad">ليست بالترتيب الصحيح. جرّب مرة أخرى حسب الأرقام من ١ إلى ٦.</div>') : '';
      const healthyFeedback = state.healthyDone ? ((state.healthySelected.length >= 4) ?
        `<div class="feedback show good">ممتاز! اخترت ${toArabicNum(state.healthySelected.length)} عادات صحية ومفيدة.</div>` :
        '<div class="feedback show bad">اختر ٤ عادات على الأقل لتبني يومًا دراسيًا أفضل.</div>') : '';

      let body = '';
      if(state.activityTab === 'choose'){
        body = `
          <div class="section-card activity-body">
            <div class="question">أي عادة تساعدك أكثر على إنجاز الواجبات في وقتها؟</div>
            <div class="options">
              ${['السهر الطويل','تنظيم الوقت','ترك الواجب لليوم التالي','عدم كتابة المهام'].map((opt,i)=>`<button class="option-btn ${state.activityOneAnswered && i===1 ? 'correct' : ''}" onclick="answerActivityOne(${i})">${opt}</button>`).join('')}
            </div>
            ${chooseFeedback}
          </div>`;
      } else if(state.activityTab === 'order'){
        body = `
          <div class="section-card activity-body">
            <div class="question">رتّب النصائح من ١ إلى ٦ بالضغط على البطاقات:</div>
            <div class="sequence-pool">
              ${target.map(item=>`<button class="chip ${state.routineSelected.includes(item)?'used':''}" onclick="addRoutine('${item}')">${item}</button>`).join('')}
            </div>
            <div class="sequence-box">
              <div style="font-weight:900;color:var(--navy);margin-bottom:.5rem">ترتيبك الحالي:</div>
              <div class="sequence-selected">
                ${state.routineSelected.length ? state.routineSelected.map((item,i)=>`<span class="chip">${toArabicNum(i+1)}. ${item}</span>`).join('') : '<span style="color:#6a82a8;font-weight:800">اضغط على البطاقات ليظهر الترتيب هنا.</span>'}
              </div>
            </div>
            <div class="action-row">
              <button class="btn secondary" onclick="resetRoutine()">إعادة</button>
              <button class="btn primary" onclick="checkRoutine()">تحقق</button>
            </div>
            ${routineFeedback}
          </div>`;
      } else {
        body = `
          <div class="section-card activity-body">
            <div class="question">اختر العادات التي تساعدك على التفوق الدراسي:</div>
            <div class="checks">
              ${goodHabits.map(item=>`<label class="check-item"><input type="checkbox" onchange="toggleHealthy('${item}')" ${state.healthySelected.includes(item)?'checked':''}> <span>${item}</span></label>`).join('')}
            </div>
            <div class="action-row"><button class="btn primary" onclick="finishHealthy()">حفظ اختياراتي</button></div>
            ${healthyFeedback}
          </div>`;
      }
      return `
        <section class="center">
          <h1 class="page-title">أنشطة ممتعة</h1>
          <span class="pill">ألعب وأتعلّم</span>
        </section>
        <div class="activity-tabs">
          <button class="tab-btn ${state.activityTab==='choose'?'active':''}" onclick="setActivityTab('choose')">اختر الإجابة</button>
          <button class="tab-btn ${state.activityTab==='order'?'active':''}" onclick="setActivityTab('order')">رتّب النصائح</button>
          <button class="tab-btn ${state.activityTab==='healthy'?'active':''}" onclick="setActivityTab('healthy')">عادات صحية</button>
        </div>
        ${body}
        <div class="callout"><div style="font-size:2rem">🌟</div><div><b>كل نشاط تنجزه يضيف لك نجومًا جديدة.</b><br><span>استمر حتى تفتح جميع الشارات.</span></div></div>
        <button class="start-btn" onclick="go('quiz')"><span>📝</span> انتقل إلى الاختبار</button>
      `;
    }

    function renderQuiz(){
      return `
        <section class="center">
          <h1 class="page-title">اختبر نفسك</h1>
          <span class="pill">اختبار قصير</span>
        </section>
        <section class="quiz-card section-card">
          ${quiz.map((q,i)=>`<div class="q-item">
              <div class="q-title">${toArabicNum(i+1)}. ${q.q}</div>
              <div class="choices">${q.a.map((choice,j)=>`<label><input type="radio" name="q${i}" onchange="setQuizAnswer(${i},${j})" ${Number(state.quizAnswers[i])===j?'checked':''}> <span>${choice}</span></label>`).join('')}</div>
              ${state.quizSubmitted ? `<div style="margin-top:.7rem;font-weight:900;color:${Number(state.quizAnswers[i])===q.c?'#2d7b1f':'#a03939'}">${Number(state.quizAnswers[i])===q.c?'إجابة صحيحة':'الإجابة الصحيحة: ' + q.a[q.c]}<br><span style='color:#4d678f'>${q.explain}</span></div>` : ''}
            </div>`).join('')}
          <div class="action-row">
            <button class="btn primary" onclick="submitQuiz()">عرض النتيجة</button>
            <button class="btn secondary" onclick="go('tips')">العودة إلى النصائح</button>
          </div>
          ${state.quizSubmitted ? `<div class="result-box"><h3>نتيجتك: ${toArabicNum(state.quizScore)} / ٥</h3><p style='color:#35527d;font-weight:800'>${state.quizScore >= 4 ? 'ممتاز! لديك فهم رائع لعادات التفوق الدراسي.' : state.quizScore >= 2 ? 'أداء جيد! أعد قراءة النصائح ثم جرّب مرة أخرى.' : 'لا بأس، أعد التعلّم بهدوء ثم حاول من جديد.'}</p></div>` : ''}
        </section>
      `;
    }

    function renderAchievements(){
      const badges = getBadges();
      return `
        <section class="center">
          <h1 class="page-title">إنجازاتي</h1>
          <span class="pill">تابع تقدمك</span>
        </section>
        <section class="section-card">
          <div class="stats-grid">
            <div class="stat"><div class="big">${toArabicNum(state.stars)}</div><div>نجوم جمعتها</div></div>
            <div class="stat"><div class="big">${toArabicNum(state.visitedTips.length)}</div><div>نصائح تعلمتها</div></div>
            <div class="stat"><div class="big">${toArabicNum(state.quizScore)}</div><div>درجتك الحالية</div></div>
          </div>
          <div class="badge-grid">
            ${badges.map(b=>`<div class="badge ${b.unlocked?'':'locked'}"><div class="emoji">${b.emoji}</div><div style="font-weight:900;color:var(--navy)">${b.title}</div><div style="font-size:.95rem;color:#5c7398;font-weight:800">${b.unlocked?'تم فتح الشارة!':b.hint}</div></div>`).join('')}
          </div>
          <div class="callout"><div style="font-size:2rem">🏅</div><div><b>استمر في التعلم حتى تجمع مزيدًا من النجوم.</b><br><span>اقرأ النصائح وجرّب الأنشطة وأكمل الاختبار.</span></div></div>
          <div class="action-row"><button class="btn purple" onclick="go('tips')">واصل التعلّم</button><button class="btn secondary" onclick="resetAll()">إعادة التقدم</button></div>
        </section>
      `;
    }

    function renderProfile(){
      return `
        <section class="center">
          <h1 class="page-title">شخصيتي المتفوقة</h1>
          <span class="pill">أنا قادر</span>
        </section>
        <section class="profile-card">
          <div class="section-card">
            <h3 style="margin:.2rem 0;color:var(--navy);font-size:1.7rem">خطتي اليومية البسيطة</h3>
            <p style="margin:0;color:#35527d;font-weight:800;line-height:1.9">كلما التزمت بعادات صغيرة ومستمرة، اقتربت أكثر من التفوق الدراسي.</p>
            <div class="daily-list">
              <div class="daily-item">🎯 أضع هدفًا صغيرًا لهذا اليوم.</div>
              <div class="daily-item">👂 أنتبه داخل الصف وأشارك.</div>
              <div class="daily-item">📘 أراجع دروسي أولًا بأول.</div>
              <div class="daily-item">✏️ أنجز واجباتي بترتيب ووضوح.</div>
              <div class="daily-item">🍎 أعتني بصحتي وأنام مبكرًا.</div>
            </div>
          </div>
          <div class="motivation">
            <span class="hero-emoji">🏆</span>
            <h3 style="margin:.35rem 0;color:var(--navy)">عبارة تحفيزية</h3>
            <p style="margin:0;color:#35527d;font-weight:800;line-height:1.9">أنا أتعلم من أخطائي، وأنظم وقتي، وأجتهد كل يوم، لذلك أنا قادر على النجاح والتفوق.</p>
          </div>
        </section>
      `;
    }

    function renderPage(){
      switch(state.page){
        case 'tips': return renderTips();
        case 'activities': return renderActivities();
        case 'quiz': return renderQuiz();
        case 'achievements': return renderAchievements();
        case 'profile': return renderProfile();
        default: return renderHome();
      }
    }

    function render(){
      document.getElementById('app').innerHTML = renderPage();
      document.getElementById('starsNum').textContent = toArabicNum(state.stars);
      document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.toggle('active', btn.dataset.page===state.page || (state.page==='quiz' && btn.dataset.page==='activities')));
      saveState();
    }

    render();
  </script>
</body>
</html>
